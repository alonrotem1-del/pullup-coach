<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Pull-Up Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pull-Up Coach">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #222232;
      --border: #2e2e42;
      --text: #f0f0f8;
      --text-muted: #8888aa;
      --accent: #6c63ff;
      --accent-dim: rgba(108,99,255,0.15);
      --red: #e74c3c;
      --red-dim: rgba(231,76,60,0.15);
      --green: #2ecc71;
      --green-dim: rgba(46,204,113,0.15);
      --blue: #3498db;
      --blue-dim: rgba(52,152,219,0.15);
      --orange: #f39c12;
      --orange-dim: rgba(243,156,18,0.15);
      --purple: #9b59b6;
      --purple-dim: rgba(155,89,182,0.15);
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; }
    body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

    /* NAV */
    .nav { display: flex; background: var(--surface); border-top: 1px solid var(--border); position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 100; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 0 14px; background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 600; cursor: pointer; letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.2s; }
    .nav-btn .icon { font-size: 22px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active .icon { transform: scale(1.1); }

    /* HEADER */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }

    /* VIEWS */
    .view { display: none; flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 90px; }
    .view.active { display: block; }

    /* CARDS */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }

    /* BADGES */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .badge.strength { background: var(--red-dim); color: var(--red); }
    .badge.volume { background: var(--blue-dim); color: var(--blue); }
    .badge.light { background: var(--green-dim); color: var(--green); }
    .badge.max_test { background: var(--orange-dim); color: var(--orange); }
    .badge.bouldering { background: var(--purple-dim); color: var(--purple); }
    .badge.rest { background: rgba(149,165,166,0.15); color: #95a5a6; }

    /* BUTTONS */
    .btn { width: 100%; padding: 16px; border-radius: var(--radius); border: none; font-size: 17px; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s; letter-spacing: -0.3px; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: var(--red); color: white; }
    .btn-outline { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }
    .btn-sm { padding: 10px 16px; font-size: 14px; border-radius: var(--radius-sm); width: auto; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* TIMER */
    .timer-display { text-align: center; padding: 20px 0; }
    .timer-ring { position: relative; width: 160px; height: 160px; margin: 0 auto 12px; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-ring .bg { fill: none; stroke: var(--surface2); stroke-width: 8; }
    .timer-ring .progress { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 1s linear; }
    .timer-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 38px; font-weight: 800; letter-spacing: -2px; }
    .timer-label { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* SET INDICATOR */
    .set-dots { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
    .set-dot { width: 32px; height: 32px; border-radius: 50%; background: var(--surface2); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text-muted); }
    .set-dot.done { background: var(--green-dim); border-color: var(--green); color: var(--green); }
    .set-dot.current { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* FORM ELEMENTS */
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 12px; font-size: 15px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }
    textarea.form-input { resize: none; height: 70px; }

    /* SLIDER */
    .slider-wrap { display: flex; align-items: center; gap: 10px; }
    .slider { flex: 1; -webkit-appearance: none; height: 6px; border-radius: 3px; background: var(--surface2); outline: none; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .slider-val { font-size: 22px; font-weight: 800; width: 36px; text-align: center; }
    /* ALERT */
    .alert { border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; font-weight: 500; margin-bottom: 12px; display: flex; gap: 10px; align-items: flex-start; }
    .alert.warning { background: var(--orange-dim); border: 1px solid rgba(243,156,18,0.3); color: var(--orange); }
    .alert.danger { background: var(--red-dim); border: 1px solid rgba(231,76,60,0.3); color: var(--red); }
    .alert.success { background: var(--green-dim); border: 1px solid rgba(46,204,113,0.3); color: var(--green); }
    .alert.info { background: var(--accent-dim); border: 1px solid rgba(108,99,255,0.3); color: var(--accent); }

    /* BIG STAT */
    .stat-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .stat-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 12px; text-align: center; }
    .stat-val { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .stat-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-top: 2px; }

    /* HISTORY LIST */
    .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
    .log-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .log-item-date { font-size: 12px; color: var(--text-muted); }
    .log-sets { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .log-set-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; font-size: 12px; font-weight: 600; }

    /* WEEKLY PLAN */
    .day-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .day-name { font-weight: 700; width: 90px; font-size: 14px; }
    .day-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 8px; font-size: 14px; outline: none; }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; padding: 20px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
    .modal-close { float: right; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }

    /* PROGRESS */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .chart-title { font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

    /* SESSION COMPLETE */
    .complete-screen { text-align: center; padding: 40px 20px; }
    .complete-screen .big-emoji { font-size: 64px; margin-bottom: 16px; }
    .complete-screen h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .complete-screen p { color: var(--text-muted); margin-bottom: 24px; }

    /* TOGGLE */
    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .toggle-label { font-size: 15px; }
    .toggle-desc { font-size: 12px; color: var(--text-muted); }
    .toggle { width: 44px; height: 26px; background: var(--surface2); border: 1px solid var(--border); border-radius: 13px; position: relative; cursor: pointer; transition: background 0.2s; }
    .toggle.on { background: var(--accent); border-color: var(--accent); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.2s; }
    .toggle.on::after { left: 20px; }

    /* NEXT SET INFO */
    .next-set-info { display: flex; justify-content: center; gap: 20px; margin: 12px 0; }
    .next-set-info .item { text-align: center; }
    .next-set-info .item .val { font-size: 22px; font-weight: 800; }
    .next-set-info .item .lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }

    /* CHECKBOX */
    .checkbox-row { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 8px 0; }
    .checkbox-row input { width: 20px; height: 20px; accent-color: var(--red); cursor: pointer; }
    .checkbox-row span { font-size: 15px; }

    /* RPE/RIR SELECTOR */
    .scale-btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
    .scale-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 10px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .scale-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* PROGRESS SUGGESTION */
    .progress-card { background: var(--orange-dim); border: 1px solid rgba(243,156,18,0.3); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }
    .progress-card h3 { color: var(--orange); font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .progress-card p { color: var(--text); font-size: 14px; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* SECTION HEADER */
    .section-header { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin: 20px 0 8px; }

    /* INSTALL BANNER */
    .install-banner { background: var(--accent-dim); border: 1px solid rgba(108,99,255,0.4); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; display: none; align-items: center; gap: 12px; }
    .install-banner.visible { display: flex; }
    .install-banner .install-text { flex: 1; font-size: 14px; }
    .install-banner .install-text strong { display: block; color: var(--accent); margin-bottom: 2px; }
    .install-banner .install-text span { font-size: 12px; color: var(--text-muted); }
    .notif-banner { background: var(--green-dim); border: 1px solid rgba(46,204,113,0.3); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 12px; display:none; align-items: center; gap:10px; font-size:14px; }
    .notif-banner.visible { display: flex; }

    select option { background: #1a1a24; }
    .text-muted { color: var(--text-muted); }
    .mt-8 { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }

    /* MISSION CARD */
    .mission-card { border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .mission-card.anchor { background: linear-gradient(135deg, rgba(231,76,60,0.1), rgba(231,76,60,0.04)); border: 2px solid rgba(231,76,60,0.4); }
    .mission-card.anchor-ladder { background: linear-gradient(135deg, rgba(52,152,219,0.1), rgba(52,152,219,0.04)); border: 2px solid rgba(52,152,219,0.4); }
    .mission-card.light-day { background: linear-gradient(135deg, rgba(46,204,113,0.08), rgba(46,204,113,0.03)); border: 2px solid rgba(46,204,113,0.3); }
    .mission-card.normal { background: var(--surface); border: 1px solid var(--border); }
    .mission-type { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    .mission-title { font-size: 21px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
    .mission-detail { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.65; }
    .anchor-tag { display: inline-flex; align-items: center; gap: 4px; border-radius: 12px; padding: 3px 10px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .anchor-tag.pyramid { background: rgba(231,76,60,0.18); color: var(--red); border: 1px solid rgba(231,76,60,0.35); }
    .anchor-tag.ladder-tag { background: rgba(52,152,219,0.18); color: var(--blue); border: 1px solid rgba(52,152,219,0.35); }
    .anchor-tag.max-tag { background: rgba(243,156,18,0.18); color: var(--orange); border: 1px solid rgba(243,156,18,0.35); }
    .anchor-warn { font-size: 12px; font-weight: 600; margin-bottom: 10px; }

    /* ANCHOR WEEK PILLS */
    .anchor-week { display: flex; gap: 8px; margin-bottom: 12px; }
    .anchor-pill { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; }
    .anchor-pill.done { background: rgba(46,204,113,0.08); border-color: var(--green); }
    .anchor-pill.missed { background: var(--red-dim); border-color: var(--red); }
    .anchor-pill.today-pill { background: var(--accent-dim); border-color: var(--accent); }
    .anchor-pill.skipped-pill { background: rgba(149,165,166,0.1); border-color: rgba(149,165,166,0.3); }
    .ap-icon { font-size: 18px; margin-bottom: 2px; }
    .ap-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .ap-status { font-size: 12px; font-weight: 700; margin-top: 2px; }
    .anchor-pill.done .ap-status { color: var(--green); }
    .anchor-pill.missed .ap-status { color: var(--red); }
    .anchor-pill.today-pill .ap-status { color: var(--accent); }
    .anchor-pill.skipped-pill .ap-status { color: var(--text-muted); }

    /* COACHING MESSAGE */
    .coaching-msg { border-radius: var(--radius-sm); padding: 11px 14px; margin-bottom: 12px; font-size: 14px; line-height: 1.5; }
    .coaching-msg.rest { background: rgba(243,156,18,0.1); border-left: 3px solid var(--orange); color: var(--text); }
    .coaching-msg.go { background: rgba(46,204,113,0.1); border-left: 3px solid var(--green); color: var(--text); }
    .coaching-msg.info { background: var(--accent-dim); border-left: 3px solid var(--accent); color: var(--text); }

    /* SKIP REASON BUTTONS */
    .skip-reason-btn { width:100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; text-align: left; cursor: pointer; color: var(--text); transition: border-color 0.15s; }
    .skip-reason-btn:hover { border-color: var(--accent); }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>💪 Pull-Up Coach</h1>
  <div class="header-actions">
    <button class="icon-btn" onclick="openPlanModal()" title="Edit weekly plan">📅</button>
    <button class="icon-btn" onclick="openSettingsModal()" title="Settings">⚙️</button>
  </div>
</div>

<!-- INSTALL / NOTIFICATION BANNERS (shown inside home view dynamically) -->

<!-- VIEWS -->
<div id="view-home" class="view active">
  <div id="dashboard-content"></div>
</div>

<div id="view-session" class="view">
  <div id="session-content"></div>
</div>

<div id="view-history" class="view">
  <div id="history-content"></div>
</div>

<div id="view-progress" class="view">
  <div id="progress-content"></div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn active" onclick="showView('home')" id="nav-home">
    <span class="icon">🏠</span>Home
  </button>
  <button class="nav-btn" onclick="showView('session')" id="nav-session">
    <span class="icon">⚡</span>Session
  </button>
  <button class="nav-btn" onclick="showView('history')" id="nav-history">
    <span class="icon">📋</span>History
  </button>
  <button class="nav-btn" onclick="showView('progress')" id="nav-progress">
    <span class="icon">📈</span>Progress
  </button>
</nav>

<!-- MODALS -->
<div class="modal-overlay" id="plan-modal">
  <div class="modal">
    <button class="modal-close" onclick="closePlanModal()">✕</button>
    <div class="modal-title">Weekly Plan <button onclick="togglePlanHelp()" style="background:none;border:1.5px solid var(--text-muted);border-radius:50%;width:22px;height:22px;font-size:13px;color:var(--text-muted);cursor:pointer;vertical-align:middle;line-height:1;margin-left:6px">?</button></div>
    <div id="plan-help-content" style="display:none;margin-bottom:14px;border-radius:10px;overflow:hidden"></div>
    <div id="plan-modal-content"></div>
    <button class="btn btn-primary mt-12" onclick="savePlan()">Save Plan</button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeSettingsModal()">✕</button>
    <div class="modal-title">Settings</div>
    <div id="settings-modal-content"></div>
    <button class="btn btn-primary mt-12" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<div class="modal-overlay" id="log-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeLogModal()">✕</button>
    <div class="modal-title" id="log-modal-title">Log Set</div>
    <div id="log-modal-content"></div>
  </div>
</div>

<div class="modal-overlay" id="past-session-modal">
  <div class="modal">
    <button class="modal-close" onclick="closePastSessionModal()">✕</button>
    <div class="modal-title">Log Past Session</div>
    <div id="past-session-content"></div>
  </div>
</div>

<div class="modal-overlay" id="skip-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeSkipModal()">✕</button>
    <div class="modal-title">Skip Session</div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:14px">Select a reason — this helps track your consistency.</p>
    <div id="skip-reason-list"></div>
  </div>
</div>

<script>
// ============================================================
// CONSTANTS & DEFAULTS
// ============================================================

const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const PROTOCOLS = {
  strength: {
    name: 'Pyramid Day', icon: '💪', color: 'var(--red)',
    description: 'Descending sets at start of workout, stop 1–2 reps before failure',
    restRange: [120, 180]
  },
  volume: {
    name: 'Ladder Day', icon: '🔄', color: 'var(--blue)',
    description: 'Ladder sets 1,2,3 × 2–3 rounds, no failure',
    miniRestRange: [20, 30], roundRestRange: [120, 180]
  },
  light: {
    name: 'Light Practice Day', icon: '🌱', color: 'var(--green)',
    description: 'Easy mini-sets spread across the day. Stop if any joint feels tired.',
    sets: 3, reps: 2, restRange: [90, 120]
  },
  max_test: {
    name: 'Max Test Day', icon: '🏆', color: 'var(--orange)',
    description: 'Only if fresh — warmup 1×2 reps, rest 3 min, then 1 max clean set',
    warmupReps: 2, warmupRest: 180
  },
  bouldering: {
    name: 'Bouldering Day', icon: '🧗', color: 'var(--purple)',
    description: 'Climbing day. High forearm/grip/pulling load. No pull-ups.', noPullups: true
  },
  rest: {
    name: 'Rest Day', icon: '😴', color: 'var(--text-muted)',
    description: 'Recovery day. No pull-ups.', noPullups: true
  }
};

const DEFAULT_WEEKLY_PLAN = { 0:'bouldering', 1:'light', 2:'light', 3:'strength', 4:'volume', 5:'rest', 6:'max_test' };
const DEFAULT_SETTINGS = {
  soundEnabled: true, notificationsEnabled: false, maxReps: 6,
  pyramid: { restSeconds: 150, topSet: 5 },
  ladder:  { miniRestSeconds: 25, roundRestSeconds: 150, maxRung: 3, rounds: 3 },
  light:   { repsPerSet: 2, setsPerDay: 3, firstReminderHour: 9, intervalHours: 2 }
};
const DEFAULT_PROGRESSION = {
  strength: { level: 1, easySessions: 0 },  // level 0=easy variant, 1=5,4,3,2,1, 2=6,5,4,3,2,1
  volume: { ladderLevel: 0, rounds: 3, easySessions: 0 }, // ladderLevel 0=[1,2,3], 1=[1,2,3,4]
  suggestedWeighted: false
};

// ============================================================
// STORAGE LAYER
// ============================================================

const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
  del: k => localStorage.removeItem(k),
  getLog: () => DB.get('puc_log') || [],
  addLog: entry => { const l = DB.getLog(); l.push({...entry, id: Date.now()}); DB.set('puc_log', l); },
  getPlan: () => DB.get('puc_plan') || DEFAULT_WEEKLY_PLAN,
  setPlan: p => DB.set('puc_plan', p),
  getSettings: () => ({...DEFAULT_SETTINGS, ...(DB.get('puc_settings') || {})}),
  setSettings: s => DB.set('puc_settings', s),
  getSession: () => DB.get('puc_session'),
  setSession: s => DB.set('puc_session', s),
  clearSession: () => DB.del('puc_session'),
  getProgression: () => ({...DEFAULT_PROGRESSION, ...(DB.get('puc_progression') || {})}),
  setProgression: p => DB.set('puc_progression', p)
};

// ============================================================
// PROTOCOL HELPERS
// ============================================================

function getStrengthSets(level) {
  const top = DB.getSettings().pyramid?.topSet;
  if (top >= 1) return Array.from({ length: top }, (_, i) => top - i);
  const variants = [[4,3,2,2,1],[5,4,3,2,1],[6,5,4,3,2,1],[7,6,5,4,3,2]];
  return variants[Math.min(level, variants.length - 1)];
}

function getVolumeLadder(prog) {
  const maxRung = DB.getSettings().ladder?.maxRung;
  if (maxRung >= 1) return Array.from({ length: maxRung }, (_, i) => i + 1);
  return prog.ladderLevel >= 1 ? [1,2,3,4] : [1,2,3];
}

function getVolumeRounds(prog) {
  const rounds = DB.getSettings().ladder?.rounds;
  if (rounds >= 1) return rounds;
  return prog.rounds || 3;
}

function getPersonalBest() {
  const log = DB.getLog();
  const maxSets = log.filter(e => e.sessionType === 'max_test' && e.setType === 'max' && e.reps > 0);
  if (!maxSets.length) return null;
  return Math.max(...maxSets.map(e => e.reps));
}

function getTodayType() {
  const plan = DB.getPlan();
  const day = new Date().getDay();
  return plan[day] || 'rest';
}

function formatTime(seconds) {
  const m = Math.floor(Math.abs(seconds) / 60);
  const s = Math.abs(seconds) % 60;
  return (seconds < 0 ? '-' : '') + (m > 0 ? `${m}:${s.toString().padStart(2,'0')}` : `${s}s`);
}

function getRestDuration(sessionType, phaseType) {
  const s = DB.getSettings();
  if (sessionType === 'strength') return s.pyramid?.restSeconds ?? 150;
  if (sessionType === 'light') return s.light?.restSeconds ?? 90;
  if (sessionType === 'volume') {
    if (phaseType === 'mini_rest') return s.ladder?.miniRestSeconds ?? 25;
    return s.ladder?.roundRestSeconds ?? 150;
  }
  if (sessionType === 'max_test' && phaseType === 'warmup_rest') return 180;
  return 150;
}

// ============================================================
// OVERTRAINING & SMART LOGIC
// ============================================================

function hasPainRecently() {
  const log = DB.getLog();
  const last48h = Date.now() - 48 * 3600 * 1000;
  return log.some(e => e.pain && new Date(e.date).getTime() > last48h);
}

function getOvertTrainingWarning(sessionType) {
  if (hasPainRecently()) return { level: 'danger', msg: '⛔ Joint pain reported recently. Rest until fully recovered — no pull-ups.' };
  return null;
}

function checkPerformanceDrop() {
  const log = DB.getLog();
  const sessions = [];
  let current = null;
  for (const entry of log) {
    if (!current || current.date !== entry.date.slice(0,10)) {
      if (current) sessions.push(current);
      current = { date: entry.date.slice(0,10), type: entry.sessionType, totalReps: 0, sets: 0 };
    }
    current.totalReps += (entry.reps || 0);
    current.sets++;
  }
  if (current) sessions.push(current);
  if (sessions.length < 3) return false;
  const last3 = sessions.slice(-3);
  return last3[2].totalReps < last3[1].totalReps && last3[1].totalReps < last3[0].totalReps;
}

function getProgressionSuggestions() {
  const prog = DB.getProgression();
  const suggestions = [];

  if (prog.strength && prog.strength.easySessions >= 2) {
    const nextLevel = prog.strength.level + 1;
    const nextSets = getStrengthSets(nextLevel);
    if (nextLevel <= 3) {
      suggestions.push({
        type: 'strength',
        title: '💪 Strength Progression Ready',
        msg: `You've had ${prog.strength.easySessions} easy strength sessions. Consider progressing to ${nextSets.join(', ')} sets.`,
        action: 'Apply',
        fn: () => {
          const p = DB.getProgression();
          p.strength.level = Math.min(p.strength.level + 1, 3);
          p.strength.easySessions = 0;
          DB.setProgression(p);
          renderProgress();
        }
      });
    }
  }

  if (prog.volume) {
    const ladder = getVolumeLadder(prog.volume);
    const rounds = getVolumeRounds(prog.volume);
    if (prog.volume.easySessions >= 2) {
      if (rounds < 4) {
        suggestions.push({
          type: 'volume',
          title: '🔄 Volume Progression Ready',
          msg: `Add another round: progress to ${ladder.join(', ')} × ${rounds + 1} rounds.`,
          action: 'Apply',
          fn: () => {
            const p = DB.getProgression();
            p.volume.rounds = Math.min(p.volume.rounds + 1, 4);
            p.volume.easySessions = 0;
            DB.setProgression(p);
            renderProgress();
          }
        });
      } else if (prog.volume.ladderLevel < 1) {
        suggestions.push({
          type: 'volume',
          title: '🔄 Volume Progression Ready',
          msg: `Progress ladder to 1,2,3,4 × 3 rounds.`,
          action: 'Apply',
          fn: () => {
            const p = DB.getProgression();
            p.volume.ladderLevel = 1;
            p.volume.rounds = 3;
            p.volume.easySessions = 0;
            DB.setProgression(p);
            renderProgress();
          }
        });
      }
    }
  }

  // Check max test log for weighted suggestion
  const log = DB.getLog();
  const maxTests = log.filter(e => e.sessionType === 'max_test' && e.setType === 'max');
  if (maxTests.length && !prog.suggestedWeighted) {
    const lastMax = maxTests[maxTests.length - 1];
    if (lastMax.reps >= 10) {
      suggestions.push({
        type: 'weighted',
        title: '🏋️ Ready for Weighted Pull-Ups!',
        msg: `Max test reached ${lastMax.reps} reps. Consider adding +2.5 kg and doing 3×3–5 sets.`,
        action: 'Got it',
        fn: () => {
          const p = DB.getProgression();
          p.suggestedWeighted = true;
          DB.setProgression(p);
          renderProgress();
        }
      });
    }
  }

  return suggestions;
}

// Mark a session as easy/hard after completion
function markSessionEasy(sessionType, isEasy) {
  const prog = DB.getProgression();
  if (sessionType === 'strength') {
    prog.strength = prog.strength || { level: 1, easySessions: 0 };
    if (isEasy) prog.strength.easySessions++;
    else prog.strength.easySessions = 0;
  } else if (sessionType === 'volume') {
    prog.volume = prog.volume || { ladderLevel: 0, rounds: 3, easySessions: 0 };
    if (isEasy) prog.volume.easySessions++;
    else prog.volume.easySessions = 0;
  }
  DB.setProgression(prog);
}

// ============================================================
// SESSION STATE MACHINE
// ============================================================

/*
  Session object:
  {
    type: 'strength' | 'volume' | 'light' | 'max_test' | 'bouldering',
    startTime: ISO string,
    phase: 'active' | 'resting' | 'complete',
    // For strength/light:
    setIndex: 0..N,
    sets: [],  // logged sets
    // For volume:
    round: 0..rounds-1,
    stepIndex: 0..ladder.length-1,
    roundSets: [], // sets in current round
    allSets: [],
    // For max_test:
    subPhase: 'warmup' | 'max' | 'complete',
    // Timer:
    timerEnd: ISO string | null,
    timerTotal: seconds,
    // Phase metadata:
    restType: 'between_sets' | 'mini_rest' | 'round_rest' | 'warmup_rest'
  }
*/

function buildNewSession(type) {
  const prog = DB.getProgression();
  const session = {
    type,
    startTime: new Date().toISOString(),
    phase: 'active',
    sets: [],
    timerEnd: null,
    timerTotal: 0,
    restType: null
  };

  if (type === 'strength') {
    session.setIndex = 0;
    session.targetSets = getStrengthSets(prog.strength?.level ?? 1);
  } else if (type === 'volume') {
    session.round = 0;
    session.stepIndex = 0;
    session.ladder = getVolumeLadder(prog.volume || {});
    session.totalRounds = getVolumeRounds(prog.volume || {});
    session.allSets = [];
  } else if (type === 'light') {
    const lc = DB.getSettings().light || { repsPerSet: 2, setsPerDay: 3 };
    session.setIndex = 0;
    session.targetSets = Array(lc.setsPerDay).fill(lc.repsPerSet);
  } else if (type === 'max_test') {
    session.subPhase = 'warmup';
  } else if (type === 'bouldering') {
    session.phase = 'complete';
  }
  return session;
}

function getNextSetInfo(session) {
  if (session.type === 'strength' || session.type === 'light') {
    if (session.setIndex >= session.targetSets.length) return null;
    return {
      label: `Set ${session.setIndex + 1} of ${session.targetSets.length}`,
      targetReps: session.targetSets[session.setIndex],
      setNum: session.setIndex + 1,
      totalSets: session.targetSets.length
    };
  }
  if (session.type === 'volume') {
    const reps = session.ladder[session.stepIndex];
    const stepLabel = session.ladder.map(r => `${r}`).join(',');
    return {
      label: `Round ${session.round + 1}/${session.totalRounds} • Step ${session.stepIndex + 1} (${reps} reps)`,
      targetReps: reps,
      setNum: session.stepIndex + 1,
      totalSets: session.ladder.length,
      round: session.round + 1,
      totalRounds: session.totalRounds,
      ladder: stepLabel
    };
  }
  if (session.type === 'max_test') {
    if (session.subPhase === 'warmup') return { label: 'Warmup Set', targetReps: 2, setNum: 0, totalSets: 1, isWarmup: true };
    if (session.subPhase === 'max') return { label: 'MAX SET — Go!', targetReps: '?', setNum: 1, totalSets: 1, isMax: true };
  }
  return null;
}

function advanceSession(session, loggedEntry) {
  session.sets.push(loggedEntry);

  function startRest(restType, dur, notifMsg) {
    session.phase = 'resting';
    session.restType = restType;
    session.timerTotal = dur;
    session.timerEnd = new Date(Date.now() + dur * 1000).toISOString();
    scheduleNotification(dur, '⏰ Pull-Up Coach', notifMsg);
  }

  if (session.type === 'strength') {
    session.setIndex++;
    if (session.setIndex >= session.targetSets.length) {
      session.phase = 'complete';
    } else {
      const dur = getRestDuration(session.type, 'between_sets');
      const next = session.targetSets[session.setIndex];
      startRest('between_sets', dur, `Rest done! Next set: ${next} reps`);
    }
  } else if (session.type === 'light') {
    session.setIndex++;
    if (session.setIndex >= session.targetSets.length) {
      session.phase = 'complete';
    } else {
      session.phase = 'light_break';
    }
  } else if (session.type === 'volume') {
    session.allSets = session.allSets || [];
    session.allSets.push(loggedEntry);
    session.stepIndex++;
    if (session.stepIndex >= session.ladder.length) {
      session.stepIndex = 0;
      session.round++;
      if (session.round >= session.totalRounds) {
        session.phase = 'complete';
      } else {
        const dur = getRestDuration(session.type, 'round_rest');
        startRest('round_rest', dur, `Round rest done! Round ${session.round + 1} — start with ${session.ladder[0]} rep`);
      }
    } else {
      const dur = getRestDuration(session.type, 'mini_rest');
      startRest('mini_rest', dur, `Go! Next: ${session.ladder[session.stepIndex]} reps`);
    }
  } else if (session.type === 'max_test') {
    if (session.subPhase === 'warmup') {
      session.subPhase = 'resting_before_max';
      startRest('warmup_rest', 180, '🏆 Rest done! Do your MAX set now — stop when form breaks!');
    } else if (session.subPhase === 'max') {
      session.phase = 'complete';
    }
  }
  return session;
}

function onTimerComplete(session) {
  if (session.restType === 'warmup_rest') {
    session.subPhase = 'max';
  }
  session.phase = 'active';
  session.timerEnd = null;
  session.restType = null;
  return session;
}

let currentView = 'home';
let timerInterval = null;
let chartInstances = {};

function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
  document.getElementById(`nav-${name}`).classList.add('active');
  currentView = name;
  if (name === 'home') renderDashboard();
  if (name === 'session') renderSession();
  if (name === 'history') renderHistory();
  if (name === 'progress') renderProgress();
}

// ============================================================
// RENDER: DASHBOARD
// ============================================================

// Returns YYYY-MM-DD in the user's LOCAL timezone — used everywhere
// dates are compared so UTC-offset shifts never cause false mismatches.
function getLocalDateKey(date) {
  const d = (date instanceof Date) ? date : new Date(date);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getTodayLogs() {
  const today = getLocalDateKey(new Date());
  return DB.getLog().filter(e => getLocalDateKey(new Date(e.date)) === today);
}

function renderDashboard() {
  const todayType = getTodayType();
  const proto = PROTOCOLS[todayType];
  const warning = getOvertTrainingWarning(todayType);
  const session = DB.getSession();
  const dropWarning = checkPerformanceDrop();
  const suggestions = getProgressionSuggestions();
  const pb = getPersonalBest();
  const todayLogs = getTodayLogs();
  const settings = DB.getSettings();
  const li = settings.light || { setsPerDay: 3 };
  const anchor = getAnchorConsistency();
  const missedWarnings = getMissedAnchorWarnings();

  let html = '';

  // Install / notification banners
  if (deferredInstallPrompt) {
    html += `<div class="install-banner visible">
      <span style="font-size:28px">📲</span>
      <div class="install-text"><strong>Install App</strong><span>Add to home screen for the full experience + notifications</span></div>
      <button class="btn btn-primary btn-sm" onclick="triggerInstallPrompt()">Install</button>
    </div>`;
  }
  if (!settings.notificationsEnabled && 'Notification' in window && Notification.permission !== 'denied') {
    html += `<div class="notif-banner visible">
      <span style="font-size:22px">🔔</span>
      <div style="flex:1;font-size:14px"><strong style="color:var(--green)">Enable Reminders</strong><br><span style="color:var(--text-muted);font-size:12px">Get notified when rest time is up</span></div>
      <button class="btn btn-green btn-sm" onclick="enableNotifications()">Enable</button>
    </div>`;
  }

  // ── TODAY'S MISSION ───────────────────────────────────────────
  const isAnchor = isAnchorDay(todayType);
  const todayDone = todayLogs.some(e => e.sessionType === todayType && e.setType !== 'skip' && (e.setType === 'summary' || e.reps > 0));
  const todaySkipped = todayLogs.some(e => e.setType === 'skip');
  const sessionActive = session && session.phase !== 'complete';
  const missionText = buildMissionText(todayType);

  let cardClass = isAnchor ? (todayType === 'strength' ? 'anchor' : 'anchor-ladder') : todayType === 'light' ? 'light-day' : 'normal';

  html += `<div class="mission-card ${cardClass}">`;

  // Tag + header row
  html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
    <div style="flex:1">`;
  if (isAnchor) {
    html += `<div class="anchor-tag ${todayType === 'strength' ? 'pyramid' : 'ladder-tag'}">⚓ Anchor Day</div>`;
  } else if (todayType === 'max_test') {
    html += `<div class="anchor-tag max-tag">🏆 Test Day</div>`;
  }
  html += `<div class="mission-type" style="color:${proto.color}">${DAY_NAMES[new Date().getDay()]}</div>
      <div class="mission-title">${proto.icon} ${proto.name}</div>
    </div>`;
  // PB display — always visible on the right
  if (pb !== null) {
    html += `<div style="text-align:center;min-width:52px">
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px">Best</div>
      <div style="font-size:46px;font-weight:900;color:var(--orange);line-height:1">${pb}</div>
      <div style="font-size:10px;color:var(--text-muted)">reps</div>
    </div>`;
  } else if (todayDone) {
    html += `<div style="font-size:32px;line-height:1;margin-top:4px">✅</div>`;
  }
  if (todaySkipped && !todayDone) html += `<div style="font-size:13px;color:var(--text-muted);font-weight:600;margin-top:8px">Skipped</div>`;
  html += `</div>`;

  // Mission detail
  html += `<div class="mission-detail" style="margin-top:8px">${missionText}</div>`;

  if (isAnchor && !todayDone && !todaySkipped) {
    const anchorColor = todayType === 'strength' ? 'var(--red)' : 'var(--blue)';
    html += `<div class="anchor-warn" style="color:${anchorColor}">⚓ Do not skip unless there is pain.</div>`;
  }

  // CTA area
  if (sessionActive && session.type === todayType) {
    // Session in progress for today's type
    const coachMsg = getCoachingMessage(session);
    if (coachMsg) html += `<div class="coaching-msg go" style="margin-bottom:10px">${coachMsg.text}</div>`;
    html += `<button class="btn btn-primary" onclick="showView('session')">Continue Session →</button>`;
  } else if (sessionActive && session.type !== todayType) {
    html += `<button class="btn btn-outline" onclick="showView('session')" style="margin-bottom:8px">⚡ ${PROTOCOLS[session.type].name} in progress →</button>`;
    if (!proto.noPullups && todayType !== 'light' && !todayDone) {
      html += `<div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary" style="flex:1" onclick="startSessionFromDash()">▶ Start Today's Session</button>
        <button class="btn btn-outline" style="padding:0 16px;width:auto" onclick="openSkipModal(true)">Skip</button>
      </div>`;
    }
  } else if (todayType === 'light') {
    const done = todayLogs.filter(e => e.sessionType === 'light').length;
    const total = li.setsPerDay;
    const dots = Array.from({length: total}, (_, i) =>
      `<div class="set-dot ${i < done ? 'done' : i === done ? 'current' : ''}" style="width:30px;height:30px;font-size:13px">${i < done ? '✓' : i + 1}</div>`
    ).join('');
    html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div class="set-dots" style="gap:6px">${dots}</div>
      <div style="font-size:13px;color:var(--text-muted)">${done}/${total} done</div>
    </div>`;
    if (done < total) {
      const nextInfo = getLightNextTime();
      html += `<div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-green" style="flex:1" onclick="openLightMiniLog(${done + 1}, ${total})">+ Log mini-set ${done + 1}/${total}</button>
        ${nextInfo ? `<div style="font-size:12px;color:var(--text-muted);white-space:nowrap">Next at<br><strong>${nextInfo.hour}:00</strong></div>` : ''}
      </div>`;
    } else {
      html += `<div style="font-size:15px;color:var(--green);font-weight:700">✅ All ${total} mini-sets done today!</div>`;
    }
  } else if (!proto.noPullups && !todayDone && !todaySkipped) {
    const isDanger = warning?.level === 'danger';
    html += `<div style="display:flex;gap:8px">
      <button class="btn ${isDanger ? 'btn-outline' : 'btn-primary'}" style="flex:1" onclick="startSessionFromDash()">
        ${isDanger ? '⚠️ Start anyway' : '▶ Start Session'}
      </button>
      <button class="btn btn-outline" style="padding:0 16px;width:auto" onclick="openSkipModal(true)">Skip</button>
    </div>`;
  } else if (proto.noPullups) {
    html += `<div style="font-size:13px;color:var(--text-muted)">${proto.description}</div>`;
  }

  html += `</div>`;

  // ── ANCHOR WEEK STATUS ────────────────────────────────────────
  const plan = DB.getPlan();
  const planHasPyramid = Object.values(plan).includes('strength');
  const planHasLadder = Object.values(plan).includes('volume');
  if (planHasPyramid || planHasLadder) {
    html += `<div class="anchor-week">`;

    if (planHasPyramid) {
      const st = anchor.pyramid;
      const cls = {done:'done', missed:'missed', today:'today-pill', skipped:'skipped-pill'}[st] || '';
      const statusLabel = {done:'✓ Done', missed:'✗ Missed', today:'Today', upcoming:'Upcoming', skipped:'Skipped'}[st] || '—';
      html += `<div class="anchor-pill ${cls}">
        <div class="ap-icon">💪</div>
        <div class="ap-label">Pyramid</div>
        <div class="ap-status">${statusLabel}</div>
      </div>`;
    }
    if (planHasLadder) {
      const st = anchor.ladder;
      const cls = {done:'done', missed:'missed', today:'today-pill', skipped:'skipped-pill'}[st] || '';
      const statusLabel = {done:'✓ Done', missed:'✗ Missed', today:'Today', upcoming:'Upcoming', skipped:'Skipped'}[st] || '—';
      html += `<div class="anchor-pill ${cls}">
        <div class="ap-icon">🔄</div>
        <div class="ap-label">Ladder</div>
        <div class="ap-status">${statusLabel}</div>
      </div>`;
    }
    if (pb !== null) {
      html += `<div class="anchor-pill">
        <div class="ap-icon">🎯</div>
        <div class="ap-label">Next goal</div>
        <div class="ap-status" style="color:var(--orange)">${pb + 1} reps</div>
      </div>`;
    }

    html += `</div>`;
  }

  // ── MISSED ANCHOR WARNINGS ────────────────────────────────────
  missedWarnings.forEach(w => {
    if (w.soft) {
      html += `<div class="alert info" style="font-size:13px">ℹ️ ${w.text}</div>`;
    } else {
      html += `<div class="alert warning">⚓ ${w.text}</div>`;
    }
  });

  // ── PAIN / PERFORMANCE WARNINGS ──────────────────────────────
  if (warning) html += `<div class="alert ${warning.level}">${warning.msg}</div>`;
  if (dropWarning) html += `<div class="alert warning">⚠️ Performance dropped 2 sessions in a row. Consider reducing volume.</div>`;

  // ── PROGRESSION SUGGESTIONS ───────────────────────────────────
  if (suggestions.length) {
    suggestions.forEach(s => {
      html += `<div class="progress-card">
        <h3>${s.title}</h3><p>${s.msg}</p>
        <button class="btn btn-outline btn-sm mt-8" onclick="applyProgression('${s.type}')">${s.action}</button>
      </div>`;
    });
  }

  // ── THIS WEEK ────────────────────────────────────────────────
  const weekStats = getWeekStats();
  html += `<div class="section-header">This Week</div>
  <div class="stat-row">
    <div class="stat-box">
      <div class="stat-val" style="color:var(--accent)">${weekStats.totalReps}</div>
      <div class="stat-lbl">Total Reps</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" style="color:var(--green)">${weekStats.sessions}</div>
      <div class="stat-lbl">Days Trained</div>
    </div>
  </div>`;

  document.getElementById('dashboard-content').innerHTML = html;
}

function startSessionFromDash() {
  const todayType = getTodayType();
  startSession(todayType);
  showView('session');
}

function applyProgression(type) {
  const suggestions = getProgressionSuggestions();
  const s = suggestions.find(x => x.type === type);
  if (s) s.fn();
  renderDashboard();
}

function getWeekStats() {
  const log = DB.getLog();
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0,0,0,0);
  const weekEntries = log.filter(e => new Date(e.date) >= startOfWeek);
  const sessions = new Set(weekEntries.map(e => getLocalDateKey(new Date(e.date)))).size;
  const totalReps = weekEntries.reduce((s,e) => s + (e.reps || 0), 0);
  return { sessions, totalReps };
}

// ============================================================
// ANCHOR DAY & COACHING HELPERS
// ============================================================

function isAnchorDay(type) {
  return type === 'strength' || type === 'volume';
}

function getAnchorConsistency() {
  const plan = DB.getPlan();
  const log = DB.getLog();
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);
  const today = now.getDay();
  const result = { pyramid: null, ladder: null };

  const weekEntries = log.filter(e => new Date(e.date) >= startOfWeek);

  for (const [anchorType, key] of [['strength', 'pyramid'], ['volume', 'ladder']]) {
    const scheduledDays = Object.entries(plan)
      .filter(([, t]) => t === anchorType)
      .map(([d]) => parseInt(d));
    if (scheduledDays.length === 0) continue;

    // Week-level completion: done on ANY day this week counts
    const completedThisWeek = weekEntries.some(e =>
      e.sessionType === anchorType && e.setType !== 'skip' && e.reps > 0
    );
    const skippedThisWeek = weekEntries.some(e =>
      e.sessionType === anchorType && e.setType === 'skip'
    );
    const isScheduledToday   = plan[today] === anchorType;
    const hasFutureDay       = scheduledDays.some(d => d > today);
    const allScheduledDaysPast = scheduledDays.every(d => d < today);

    if (completedThisWeek) {
      result[key] = 'done';
    } else if (skippedThisWeek) {
      result[key] = 'skipped';
    } else if (isScheduledToday) {
      result[key] = 'today';
    } else if (hasFutureDay) {
      result[key] = 'upcoming';
    } else if (allScheduledDaysPast) {
      result[key] = 'missed';
    } else {
      result[key] = 'upcoming';
    }
  }
  return result;
}

// Returns array of { text, soft }.
// Only fires when an anchor type was not completed AND all its scheduled
// days this week are already past — i.e. there is genuinely no more
// chance to do it this week without deliberate rescheduling.
function getMissedAnchorWarnings() {
  const plan = DB.getPlan();
  const log = DB.getLog();
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);
  const today = now.getDay();
  const warnings = [];

  const weekEntries = log.filter(e => new Date(e.date) >= startOfWeek);

  for (const anchorType of ['strength', 'volume']) {
    const scheduledDays = Object.entries(plan)
      .filter(([, t]) => t === anchorType)
      .map(([d]) => parseInt(d));
    if (scheduledDays.length === 0) continue;

    const completedThisWeek = weekEntries.some(e =>
      e.sessionType === anchorType && e.setType !== 'skip' && e.reps > 0
    );
    const skippedThisWeek = weekEntries.some(e =>
      e.sessionType === anchorType && e.setType === 'skip'
    );

    if (completedThisWeek || skippedThisWeek) continue;

    // Only warn once all scheduled days for this type are in the past
    // (including today counts as "still possible")
    const stillPossible = scheduledDays.some(d => d >= today);
    if (stillPossible) continue;

    const protoName = PROTOCOLS[anchorType].name;
    warnings.push({
      soft: false,
      text: `${protoName} not completed this week. You can still do it today or mark it skipped.`
    });
  }
  return warnings;
}

function getLightNextTime() {
  const s = DB.getSettings();
  const li = s.light || { setsPerDay: 3, firstReminderHour: 9, intervalHours: 2 };
  const done = getTodayLogs().filter(e => e.sessionType === 'light').length;
  const remaining = li.setsPerDay - done;
  if (remaining <= 0) return null;
  const hour = li.firstReminderHour + done * li.intervalHours;
  return { hour, remaining };
}

function buildMissionText(todayType) {
  const prog = DB.getProgression();
  const s = DB.getSettings();
  if (todayType === 'strength') {
    const sets = getStrengthSets(prog.strength?.level ?? 1);
    const restSec = s.pyramid?.restSeconds ?? 150;
    const restMin = restSec >= 60 ? `${Math.round(restSec/60 * 10)/10} min` : `${restSec}s`;
    return `Do <strong>${sets.join(', ')}</strong> reps before your workout. Rest ${restMin} between sets. Stop 1–2 reps before failure.`;
  }
  if (todayType === 'volume') {
    const ladder = getVolumeLadder(prog.volume || {});
    const rounds = getVolumeRounds(prog.volume || {});
    const mini = s.ladder?.miniRestSeconds ?? 25;
    const roundSec = s.ladder?.roundRestSeconds ?? 150;
    const roundMin = roundSec >= 60 ? `${Math.round(roundSec/60 * 10)/10} min` : `${roundSec}s`;
    return `Ladder: <strong>${ladder.join(', ')}</strong> × ${rounds} rounds. ${mini}s between steps · ${roundMin} between rounds. No failure.`;
  }
  if (todayType === 'light') {
    const li = s.light || { repsPerSet: 2, setsPerDay: 3, firstReminderHour: 9, intervalHours: 2 };
    const times = Array.from({length: li.setsPerDay}, (_, i) => `${li.firstReminderHour + i * li.intervalHours}:00`).join(' · ');
    return `<strong>${li.setsPerDay} mini-sets × ${li.repsPerSet} reps</strong> spread across the day. Scheduled: ${times}. Technique only — no effort.`;
  }
  if (todayType === 'max_test') {
    return 'Warmup: <strong>2 easy reps</strong>. Rest 3 min. Then <strong>1 max set</strong> — stop when form breaks. Only do this if you feel fresh.';
  }
  if (todayType === 'bouldering') return 'Climbing day. High grip/pulling load — no pull-ups today.';
  return 'Rest and recover. No pull-ups today.';
}

function getCoachingMessage(session) {
  if (!session) return null;
  if (session.phase === 'resting') {
    const info = getNextSetInfo(session);
    const nextReps = info?.targetReps ?? '?';
    if (session.restType === 'mini_rest') {
      return { cls: 'rest', text: `⏸ Short rest (${session.timerTotal}s). Next step: <strong>${nextReps} reps</strong>. Stay loose.` };
    }
    if (session.restType === 'round_rest') {
      return { cls: 'rest', text: `⏸ Round rest (${Math.round(session.timerTotal/60)} min). Shake out your arms. Next round starts with <strong>${nextReps} rep</strong>.` };
    }
    if (session.restType === 'warmup_rest') {
      return { cls: 'rest', text: `⏸ Rest 3 min. When ready, do your <strong>MAX set</strong> — go until form breaks.` };
    }
    return { cls: 'rest', text: `⏸ Rest ${Math.round(session.timerTotal/60)} min. Next set: <strong>${nextReps} reps</strong>. Stop 1–2 reps before failure.` };
  }
  if (session.phase === 'active') {
    const info = getNextSetInfo(session);
    if (!info) return null;
    if (session.type === 'strength') {
      const done = session.setIndex;
      const total = session.targetSets.length;
      const remaining = total - done;
      if (done === 0) return { cls: 'go', text: `▶ First set: <strong>${info.targetReps} reps</strong>. Start strong, stop 1–2 reps before failure.` };
      if (remaining === 1) return { cls: 'go', text: `▶ Last set: <strong>${info.targetReps} rep${info.targetReps > 1 ? 's' : ''}</strong>. Almost done — finish clean.` };
      return { cls: 'go', text: `▶ Set ${done + 1}/${total}: <strong>${info.targetReps} reps</strong>. Stop 1–2 reps before failure.` };
    }
    if (session.type === 'volume') {
      const isLast = session.stepIndex === session.ladder.length - 1 && session.round === session.totalRounds - 1;
      if (isLast) return { cls: 'go', text: `▶ Final step: <strong>${info.targetReps} reps</strong>. Last one — finish clean!` };
      if (session.stepIndex === session.ladder.length - 1) return { cls: 'go', text: `▶ Top of ladder: <strong>${info.targetReps} reps</strong>. Then a ${Math.round(getRestDuration('volume', 'round_rest')/60)} min round rest.` };
      return { cls: 'go', text: `▶ Round ${session.round + 1} · Step ${session.stepIndex + 1}: <strong>${info.targetReps} reps</strong>. Clean reps, no failure.` };
    }
    if (session.type === 'max_test') {
      if (session.subPhase === 'warmup') return { cls: 'go', text: `▶ Warmup: <strong>2 easy reps</strong>. Light effort — just getting blood in the muscles.` };
      if (session.subPhase === 'max') return { cls: 'go', text: `▶ <strong>MAX SET</strong>. Go all out — stop the moment your form breaks. Every clean rep counts.` };
    }
  }
  return null;
}

// ============================================================
// RENDER: SESSION
// ============================================================

function renderSession() {
  const session = DB.getSession();
  const el = document.getElementById('session-content');

  if (!session) {
    renderSessionStart(el);
    return;
  }
  if (session.phase === 'complete') {
    renderSessionComplete(el, session);
    return;
  }
  if (session.phase === 'resting') {
    renderSessionResting(el, session);
    return;
  }
  if (session.phase === 'light_break') {
    renderSessionLightBreak(el, session);
    return;
  }
  renderSessionActive(el, session);
}

function renderSessionStart(el) {
  const todayType = getTodayType();
  const proto = PROTOCOLS[todayType];
  const warning = getOvertTrainingWarning(todayType);
  const prog = DB.getProgression();

  let html = `<div class="section-header">Start Session</div>`;

  // Today's recommended
  html += `<div class="card" style="border-color:${proto.color}">
    <div class="card-title">Today's Plan</div>
    <div class="badge ${todayType}" style="margin-bottom:10px">${proto.icon} ${proto.name}</div>`;

  if (todayType === 'strength') {
    const sets = getStrengthSets(prog.strength?.level ?? 1);
    const restSec = DB.getSettings().pyramid?.restSeconds ?? 150;
    html += `<p style="font-size:14px;color:var(--text-muted)">Sets: ${sets.join(' → ')} reps</p>`;
    html += `<p style="font-size:13px;color:var(--text-muted);margin-top:4px">Rest ${restSec}s between sets</p>`;
  } else if (todayType === 'volume') {
    const ladder = getVolumeLadder(prog.volume || {});
    const rounds = getVolumeRounds(prog.volume || {});
    const s = DB.getSettings();
    const mini = s.ladder?.miniRestSeconds ?? 25;
    const roundR = s.ladder?.roundRestSeconds ?? 150;
    html += `<p style="font-size:14px;color:var(--text-muted)">Ladder: ${ladder.join(',')} × ${rounds} rounds</p>`;
    html += `<p style="font-size:13px;color:var(--text-muted);margin-top:4px">${mini}s between steps • ${roundR}s between rounds</p>`;
  } else if (todayType === 'light') {
    const lc = DB.getSettings().light || { repsPerSet: 2, setsPerDay: 3 };
    html += `<p style="font-size:14px;color:var(--text-muted)">${lc.setsPerDay} mini-sets × ${lc.repsPerSet} reps — spread across the day</p>`;
  } else if (todayType === 'max_test') {
    html += `<p style="font-size:14px;color:var(--text-muted)">Warmup: 2 reps → Rest 3 min → Max set</p>`;
  } else if (proto.noPullups) {
    html += `<p style="font-size:14px;color:var(--text-muted)">No pull-ups today. Log as bouldering/rest.</p>`;
  }
  html += '</div>';

  if (warning) html += `<div class="alert ${warning.level}">${warning.msg}</div>`;

  if (!proto.noPullups) {
    html += `<div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-primary" style="flex:1" onclick="startSession('${todayType}')">▶ Start Today's Session</button>
      <button class="btn btn-outline" style="padding:0 16px;width:auto" onclick="openSkipModal(true)">Skip</button>
    </div>`;
  } else {
    html += `<button class="btn btn-outline" style="margin-bottom:10px" onclick="startSession('${todayType}')">Log ${proto.name}</button>`;
  }

  html += `<div class="section-header">Start Other Session</div>`;
  Object.keys(PROTOCOLS).filter(t => t !== todayType).forEach(type => {
    const p = PROTOCOLS[type];
    html += `<button class="btn btn-outline" style="margin-bottom:8px" onclick="startSession('${type}')">${p.icon} ${p.name}</button>`;
  });

  el.innerHTML = html;
}

function startSession(type) {
  const existing = DB.getSession();
  if (existing && existing.phase !== 'complete') {
    if (!confirm('A session is already in progress. Start a new one?')) return;
  }
  const session = buildNewSession(type);
  DB.setSession(session);
  if (type === 'bouldering' || type === 'rest') {
    // Auto-log bouldering
    DB.addLog({
      date: new Date().toISOString(),
      sessionType: type,
      setType: 'session',
      reps: 0,
      forearmFatigue: 0,
      notes: type === 'bouldering' ? 'Bouldering day' : 'Rest day'
    });
    DB.setSession(session);
  }
  renderSession();
}

function renderSessionActive(el, session) {
  const info = getNextSetInfo(session);
  if (!info) { session.phase = 'complete'; DB.setSession(session); renderSession(); return; }

  let targetRepsDisplay = info.targetReps;
  let isMax = info.isMax;

  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
    <span class="badge ${session.type}">${PROTOCOLS[session.type].icon} ${PROTOCOLS[session.type].name}</span>
  </div>`;

  // Set progress dots for strength/light
  if (session.type === 'strength' || session.type === 'light') {
    html += `<div class="set-dots">`;
    session.targetSets.forEach((reps, i) => {
      let cls = i < session.setIndex ? 'done' : i === session.setIndex ? 'current' : '';
      html += `<div class="set-dot ${cls}">${i < session.setIndex ? '✓' : reps}</div>`;
    });
    html += `</div>`;
  }

  // Round/step progress for volume
  if (session.type === 'volume') {
    html += `<div style="text-align:center;margin-bottom:8px">`;
    html += `<span style="font-size:13px;color:var(--text-muted)">Round ${session.round+1}/${session.totalRounds}</span>`;
    html += `<div class="set-dots" style="margin-top:8px">`;
    session.ladder.forEach((reps, i) => {
      const done = session.round > (session.round) ? true : i < session.stepIndex;
      const current = i === session.stepIndex;
      html += `<div class="set-dot ${done ? 'done' : current ? 'current' : ''}">${done ? '✓' : reps}</div>`;
    });
    html += `</div></div>`;
  }

  html += `<div class="card" style="text-align:center;border-color:var(--accent)">
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:4px">${info.label}</div>
    <div style="font-size:64px;font-weight:900;color:var(--accent);letter-spacing:-3px">${isMax ? '∞' : targetRepsDisplay}</div>
    <div style="font-size:14px;color:var(--text-muted)">${isMax ? 'Max reps — stop when form breaks' : 'Target reps'}</div>
  </div>`;

  // Coaching message
  const coaching = getCoachingMessage(session);
  if (coaching) {
    html += `<div class="coaching-msg ${coaching.cls}">${coaching.text}</div>`;
  }

  if (session.type === 'light') {
    html += `<div class="alert info">🌱 Technique focus only. Stop well before failure.</div>`;
  }
  if (isMax) {
    html += `<div class="alert warning">🏆 Stop when your form breaks down. Honest reps only!</div>`;
  }

  html += `<button class="btn btn-green" style="margin-bottom:10px" onclick="openLogModal()">Log Set ✓</button>`;
  html += `<button class="btn btn-outline" onclick="endSessionEarly()">End / Skip Session</button>`;

  el.innerHTML = html;
}

function renderSessionLightBreak(el, session) {
  const done = session.setIndex;
  const total = session.targetSets.length;
  const reps = session.targetSets[session.setIndex] ?? session.targetSets[0];
  const s = DB.getSettings();
  const li = s.light || { firstReminderHour: 9, intervalHours: 2 };
  const nextHour = li.firstReminderHour + done * li.intervalHours;
  const remaining = total - done;

  el.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <span class="badge light">${PROTOCOLS.light.icon} ${PROTOCOLS.light.name}</span>
    </div>
    <div class="set-dots">
      ${session.targetSets.map((r, i) => `<div class="set-dot ${i < done ? 'done' : i === done ? 'current' : ''}">${i < done ? '✓' : r}</div>`).join('')}
    </div>
    <div class="coaching-msg rest" style="margin-top:12px">
      ✅ <strong>Set ${done}/${total} done.</strong>
      ${remaining > 0
        ? `Come back around <strong>${nextHour}:00</strong> for the next mini-set (${reps} reps).`
        : 'All sets done for today!'
      }
    </div>
    <div class="alert info">🌱 ${remaining} more set${remaining !== 1 ? 's' : ''} remaining today · ${reps} reps each</div>
    <button class="btn btn-green" style="margin-bottom:10px" onclick="resumeLightSession()">Ready now</button>
    <button class="btn btn-outline" onclick="endSessionEarly()">Done for today</button>`;
}

function resumeLightSession() {
  const session = DB.getSession();
  if (!session) return;
  session.phase = 'active';
  DB.setSession(session);
  renderSession();
}

function renderSessionResting(el, session) {
  const info = getNextSetInfo(session);
  const timerEnd = session.timerEnd ? new Date(session.timerEnd).getTime() : Date.now();
  const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
  const total = session.timerTotal || 1;
  const progress = Math.max(0, Math.min(1, remaining / total));
  const circumference = 440;
  const offset = circumference * progress;

  let restLabel = '';
  if (session.restType === 'mini_rest') restLabel = 'Mini-rest (20–30s)';
  else if (session.restType === 'round_rest') restLabel = 'Round rest (2–3 min)';
  else if (session.restType === 'warmup_rest') restLabel = 'Rest before max set (3 min)';
  else restLabel = 'Rest between sets (2–3 min)';

  const restCoaching = getCoachingMessage(session);

  let html = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <span class="badge ${session.type}">${PROTOCOLS[session.type].icon} ${PROTOCOLS[session.type].name}</span>
  </div>`;

  if (restCoaching) html += `<div class="coaching-msg ${restCoaching.cls}">${restCoaching.text}</div>`;

  html += `<div class="timer-display">
    <div class="timer-label" style="margin-bottom:12px">${restLabel}</div>
    <div class="timer-ring">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle class="bg" cx="80" cy="80" r="70"/>
        <circle class="progress" cx="80" cy="80" r="70" id="timer-circle" stroke-dashoffset="${circumference - offset}"/>
      </svg>
      <div class="timer-number" id="timer-number">${formatTime(remaining)}</div>
    </div>
    <div class="timer-label" id="timer-status">${remaining > 0 ? 'Resting...' : 'Ready!'}</div>
  </div>`;

  if (info) {
    html += `<div class="card" style="text-align:center">
      <div class="card-title">Next Set</div>
      <div style="font-size:14px;color:var(--text-muted)">${info.label}</div>
      <div style="font-size:36px;font-weight:800;color:var(--accent);margin:4px 0">${info.targetReps}</div>
      <div style="font-size:13px;color:var(--text-muted)">target reps</div>
    </div>`;
  }

  if (remaining <= 0) {
    html += `<button class="btn btn-primary" onclick="resumeFromRest()">Start Next Set →</button>`;
  } else {
    html += `<button class="btn btn-outline" onclick="skipRest()">Skip Rest →</button>`;
  }

  el.innerHTML = html;
  startTimerDisplay(session);
}

function startTimerDisplay(session) {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const timerEnd = session.timerEnd ? new Date(session.timerEnd).getTime() : Date.now();
    const remaining = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
    const total = session.timerTotal || 1;
    const circumference = 440;
    const offset = circumference * (remaining / total);

    const numEl = document.getElementById('timer-number');
    const circleEl = document.getElementById('timer-circle');
    const statusEl = document.getElementById('timer-status');

    if (!numEl) { clearInterval(timerInterval); return; }

    numEl.textContent = formatTime(remaining);
    if (circleEl) circleEl.style.strokeDashoffset = circumference - offset;

    if (remaining <= 0) {
      clearInterval(timerInterval);
      if (statusEl) statusEl.textContent = 'Ready!';
      playBeep();
      // Auto-show ready button
      if (currentView === 'session') {
        const s = DB.getSession();
        if (s && s.phase === 'resting') renderSessionResting(document.getElementById('session-content'), s);
      }
    }
  }, 500);
}

function resumeFromRest() {
  let session = DB.getSession();
  if (!session) return;
  cancelScheduledNotification();
  session = onTimerComplete(session);
  DB.setSession(session);
  renderSession();
}

function skipRest() {
  resumeFromRest();
}

function renderSessionComplete(el, session) {
  clearInterval(timerInterval);
  const totalReps = session.sets.reduce((s,e) => s + (e.reps||0), 0);

  let html = `<div class="complete-screen">
    <div class="big-emoji">💪</div>
    <h2>Session Complete!</h2>
    <p>${PROTOCOLS[session.type].icon} ${PROTOCOLS[session.type].name}</p>
    <div class="stat-row" style="margin:16px 0">
      <div class="stat-box"><div class="stat-val" style="color:var(--accent)">${totalReps}</div><div class="stat-lbl">Total Reps</div></div>
      <div class="stat-box"><div class="stat-val">${session.sets.length}</div><div class="stat-lbl">Sets</div></div>
    </div>
    <label class="checkbox-row" style="margin-bottom:16px">
      <input type="checkbox" id="end-pain">
      <span>⚠️ Pain or discomfort</span>
    </label>
    <button class="btn btn-primary" style="margin-bottom:10px;width:100%" onclick="finishSession()">Save & Done</button>
  </div>`;

  el.innerHTML = html;
}

function finishSession() {
  const pain = document.getElementById('end-pain').checked;
  const session = DB.getSession();

  // Save a session-summary entry
  DB.addLog({
    date: new Date().toISOString(),
    sessionType: session?.type || 'unknown',
    setType: 'summary',
    reps: 0,
    forearmFatigue: 0,
    pain,
    notes: ''
  });

  if (pain) alert('⛔ Pain noted. Rest and recover before your next session.');

}

function renderHistory() {
  const log = DB.getLog();
  const el = document.getElementById('history-content');

  let topBar = `<div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn btn-outline btn-sm" onclick="openPastSessionModal()">+ Log past session</button>
  </div>`;

  if (!log.length) {
    el.innerHTML = topBar + `<div class="empty-state"><div class="icon">📋</div><p>No sessions logged yet.<br>Start your first session!</p></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  for (const entry of log) {
    const day = entry.date.slice(0,10);
    if (!byDate[day]) byDate[day] = [];
    byDate[day].push(entry);
  }

  const dates = Object.keys(byDate).sort().reverse();
  let html = '';

  dates.forEach(date => {
    const entries = byDate[date];
    const type = entries[0].sessionType;
    const proto = PROTOCOLS[type] || PROTOCOLS.rest;
    const totalReps = entries.reduce((s,e) => s + (e.reps||0), 0);
    const hasPain = entries.some(e => e.pain);
    const skipEntry = entries.find(e => e.setType === 'skip');
    const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
    const workingSets = entries.filter(e => e.reps > 0);

    const SKIP_REASON_LABELS = { pain:'Pain', fatigue:'Fatigued', no_time:'No time', bouldering:'Bouldering', conflict:'Group training', other:'Other' };

    html += `<div class="log-item" style="${skipEntry && workingSets.length === 0 ? 'opacity:0.65' : ''}">
      <div class="log-item-header">
        <div>
          <span class="badge ${type}">${proto.icon} ${proto.name}</span>
          ${skipEntry && workingSets.length === 0 ? `<span style="font-size:11px;color:var(--text-muted);background:rgba(149,165,166,0.15);border-radius:4px;padding:2px 7px;margin-left:6px">Skipped · ${SKIP_REASON_LABELS[skipEntry.skipReason] || skipEntry.skipReason || ''}</span>` : ''}
          <div class="log-item-date" style="margin-top:4px">${dateLabel}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${workingSets.length > 0 ? `<div style="text-align:right">
            <div style="font-size:20px;font-weight:800;color:var(--accent)">${totalReps}</div>
            <div style="font-size:11px;color:var(--text-muted)">reps</div>
          </div>` : ''}
          <button onclick="deleteSession('${date}')" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px" title="Delete session">🗑️</button>
        </div>
      </div>
      <div class="log-sets">`;

    workingSets.forEach(e => {
      const rpeLabel = e.rpe ? `RPE ${e.rpe}` : '';
      html += `<span class="log-set-chip">${e.reps}${rpeLabel ? ` • ${rpeLabel}` : ''}</span>`;
    });

    html += `</div>`;

    if (workingSets.length > 0) {
      html += `<div style="display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--text-muted)">
        ${hasPain ? '<span style="color:var(--red)">⚠️ Pain reported</span>' : ''}
        <span>${workingSets.length} sets</span>
      </div>`;
    }

    const notes = entries.filter(e => e.notes && e.setType !== 'skip').map(e => e.notes).join(' • ');
    if (notes) html += `<div style="font-size:13px;color:var(--text-muted);margin-top:6px;font-style:italic">"${notes}"</div>`;

    html += `</div>`;
  });

  el.innerHTML = topBar + html;
}

function analyzeProgress() {
  const log = DB.getLog();
  if (!log.length) return null;

  const maxTests = log.filter(e => e.sessionType === 'max_test' && e.setType === 'max' && e.reps > 0)
    .sort((a,b) => new Date(a.date) - new Date(b.date));

  // PB milestones
  const milestones = [];
  let best = 0;
  maxTests.forEach(t => { if (t.reps > best) { best = t.reps; milestones.push(t); } });

  // Session counts per week (last 8 weeks)
  const now = new Date();
  const weeks = [];
  for (let w = 7; w >= 0; w--) {
    const start = new Date(now); start.setDate(now.getDate() - now.getDay() - w*7); start.setHours(0,0,0,0);
    const end   = new Date(start); end.setDate(start.getDate() + 7);
    const entries = log.filter(e => { const d = new Date(e.date); return d >= start && d < end; });
    const days = new Set(entries.filter(e => e.reps > 0).map(e => e.date.slice(0,10))).size;
    const pyramid = new Set(entries.filter(e => e.sessionType==='strength').map(e=>e.date.slice(0,10))).size;
    const ladder  = new Set(entries.filter(e => e.sessionType==='volume').map(e=>e.date.slice(0,10))).size;
    const light   = new Set(entries.filter(e => e.sessionType==='light').map(e=>e.date.slice(0,10))).size;
    const maxTest = entries.find(e => e.sessionType==='max_test' && e.setType==='max');
    weeks.push({ label: start.toLocaleDateString('en-US',{month:'short',day:'numeric'}), days, pyramid, ladder, light, maxReps: maxTest?.reps ?? null });
  }

  // What happened in weeks before PB improvements
  const preImprovementPattern = milestones.slice(1).map(imp => {
    const impDate = new Date(imp.date);
    const from = new Date(impDate); from.setDate(impDate.getDate() - 14);
    const before = log.filter(e => { const d = new Date(e.date); return d >= from && d < impDate; });
    return {
      pyramid: new Set(before.filter(e=>e.sessionType==='strength').map(e=>e.date.slice(0,10))).size,
      ladder:  new Set(before.filter(e=>e.sessionType==='volume').map(e=>e.date.slice(0,10))).size,
    };
  });

  const avgPrePyramid = preImprovementPattern.length ? Math.round(preImprovementPattern.reduce((s,w)=>s+w.pyramid,0)/preImprovementPattern.length*10)/10 : null;
  const avgPreLadder  = preImprovementPattern.length ? Math.round(preImprovementPattern.reduce((s,w)=>s+w.ladder,0)/preImprovementPattern.length*10)/10 : null;

  // Consistency: distinct training days / total days since first log
  const firstDate = new Date(log[0].date);
  const totalDays = Math.max(1, Math.ceil((now - firstDate) / 86400000));
  const trainedDays = new Set(log.filter(e=>e.reps>0).map(e=>e.date.slice(0,10))).size;
  const consistency = Math.min(100, Math.round(trainedDays / totalDays * 100 * (7/4)));

  // Biggest PB jump
  let biggestJump = null;
  milestones.forEach((m,i) => {
    if (i===0) return;
    const j = m.reps - milestones[i-1].reps;
    if (!biggestJump || j > biggestJump.jump) biggestJump = { jump: j, date: m.date.slice(0,10), reps: m.reps };
  });

  return { milestones, weeks, avgPrePyramid, avgPreLadder, consistency, biggestJump, trainedDays, totalDays };
}

  const el = document.getElementById('progress-content');
  const log = DB.getLog();
  const suggestions = getProgressionSuggestions();
  const prog = DB.getProgression();
  const insight = analyzeProgress();

  if (!log.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📈</div><p>Log some sessions to see your progress here.</p></div>`;

  let html = '';

            <div style="width:100%;background:${isLast?'var(--orange)':'var(--accent)'};border-radius:3px 3px 0 0;height:${h}%;opacity:${0.3+i/ms.length*0.7}" title="${m.date.slice(0,10)}"></div>

        <span>${ms[0].date.slice(5,10)}</span><span>${ms[ms.length-1].date.slice(5,10)}</span>

  // ── INSIGHTS ───────────────────────────────────────────────
  if (insight) {
