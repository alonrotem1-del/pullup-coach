    const cards = [];

    if (insight.consistency !== null) {
      const emoji = insight.consistency >= 70 ? '🔥' : insight.consistency >= 40 ? '💪' : '📅';
      cards.push({ emoji, title: 'Consistency', value: `${insight.consistency}%`, sub: `${insight.trainedDays} training days logged` });
    }

    if (insight.biggestJump) {
      cards.push({ emoji: '⚡', title: 'Biggest jump', value: `+${insight.biggestJump.jump} reps`, sub: `reached ${insight.biggestJump.reps} on ${insight.biggestJump.date.slice(5)}` });
    }

    if (insight.milestones?.length) {
      cards.push({ emoji: '🏆', title: 'PB broken', value: `${insight.milestones.length}×`, sub: `over the past ${Math.round(insight.totalDays/7)} weeks` });
    }

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      ${cards.map(c => `<div class="card" style="padding:14px;text-align:center">
        <div style="font-size:24px">${c.emoji}</div>
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:4px 0">${c.title}</div>
        <div style="font-size:22px;font-weight:800;color:var(--accent)">${c.value}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${c.sub}</div>
      </div>`).join('')}
    </div>`;

    if (insight.avgPrePyramid !== null && insight.milestones.length >= 2) {
      html += `<div class="card" style="padding:14px;border-left:3px solid var(--orange)">
        <div style="font-size:13px;font-weight:700;margin-bottom:6px">💡 What helped most</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6">
          In the 2 weeks before each PB improvement you averaged
          <strong style="color:var(--text)">${insight.avgPrePyramid} Pyramid</strong> and
          <strong style="color:var(--text)">${insight.avgPreLadder} Ladder</strong> sessions.
          ${insight.avgPrePyramid >= insight.avgPreLadder
            ? '💪 Pyramid sessions correlate most with your improvements.'
            : '🔄 Ladder volume appears key to your progress.'}
        </div>
      </div>`;
    }
  }

  // ── WEEKLY BREAKDOWN (last 8 weeks) ───────────────────────
  if (insight?.weeks) {
    html += `<div class="section-header">Weekly Breakdown</div>
    <div class="chart-wrap">
      <canvas id="chart-weekly-stacked" height="200"></canvas>
    </div>`;
  }

  // ── MAX TEST PROGRESSION ──────────────────────────────────
  const maxTests = log.filter(e => e.sessionType==='max_test' && e.setType==='max' && e.reps>0);
  if (maxTests.length) {
    html += `<div class="section-header">Max Test History</div>
    <div class="chart-wrap">
      <canvas id="chart-max" height="180"></canvas>
    </div>`;
  }

  // ── PROGRESSION SUGGESTIONS ───────────────────────────────
  if (suggestions.length) {
    html += `<div class="section-header">Ready to Progress</div>`;
    suggestions.forEach(s => {
      html += `<div class="progress-card">
        <h3>${s.title}</h3><p>${s.msg}</p>
        <button class="btn btn-outline btn-sm mt-8" onclick="applyProgressionFromProgress('${s.type}')">${s.action}</button>
      </div>`;
    });
  }

  // ── CURRENT PROTOCOL ──────────────────────────────────────
  const strengthSets = getStrengthSets(prog.strength?.level ?? 1);
  const ladder = getVolumeLadder(prog.volume || {});
  const rounds = getVolumeRounds(prog.volume || {});
  html += `<div class="section-header">Current Protocol</div>
  <div class="card" style="padding:12px 16px">
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">💪 Pyramid</div>
        <div style="font-size:16px;font-weight:700">${strengthSets.join(', ')}</div></div>
      <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">🔄 Ladder</div>
        <div style="font-size:16px;font-weight:700">${ladder.join(',')} × ${rounds}</div></div>
    </div>
  </div>`;

  el.innerHTML = html;

  setTimeout(() => {
    if (insight?.weeks) renderStackedWeeklyChart(insight.weeks);
    if (maxTests.length) renderMaxChart(log);
  }, 50);
}

function renderStackedWeeklyChart(weeks) {
  const canvas = document.getElementById('chart-weekly-stacked');
  if (!canvas) return;
  if (chartInstances.weeklyStacked) chartInstances.weeklyStacked.destroy();
  chartInstances.weeklyStacked = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: weeks.map(w => w.label),
      datasets: [
        { label: 'Pyramid', data: weeks.map(w => w.pyramid), backgroundColor: 'rgba(231,76,60,0.75)', borderRadius: 3 },
        { label: 'Ladder',  data: weeks.map(w => w.ladder),  backgroundColor: 'rgba(108,99,255,0.75)', borderRadius: 3 },
        { label: 'Light',   data: weeks.map(w => w.light),   backgroundColor: 'rgba(39,174,96,0.75)',  borderRadius: 3 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#8888aa', boxWidth: 12, font: { size: 11 } } },
        tooltip: { callbacks: { afterBody: (items) => {
          const w = weeks[items[0].dataIndex];
          return w.maxReps ? [`Max test: ${w.maxReps} reps`] : [];
        }}}
      },
      scales: {
        x: { stacked: true, ticks: { color: '#8888aa', font: { size: 10 } }, grid: { color: '#2e2e42' } },
        y: { stacked: true, ticks: { color: '#8888aa', font: { size: 11 }, stepSize: 1 }, grid: { color: '#2e2e42' }, beginAtZero: true, title: { display: true, text: 'days', color: '#8888aa', font: { size: 10 } } }
      }
    }
  });
}

function applyProgressionFromProgress(type) {
  const suggestions = getProgressionSuggestions();
  const s = suggestions.find(x => x.type === type);
  if (s) s.fn();
  else renderProgress();
}

function renderMaxChart(log) {
  const canvas = document.getElementById('chart-max');
  if (!canvas) return;
  if (chartInstances.max) chartInstances.max.destroy();

  const maxTests = log.filter(e => e.sessionType === 'max_test' && e.setType === 'max');
  if (!maxTests.length) { canvas.parentElement.style.display='none'; return; }

  const labels = maxTests.map(e => e.date.slice(5,10));
  const data = maxTests.map(e => e.reps);

  chartInstances.max = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Max Reps',
        data,
        borderColor: '#f39c12',
        backgroundColor: 'rgba(243,156,18,0.1)',
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: '#f39c12'
      }]
    },
    options: chartOptions('reps')
  });
}

function renderWeeklyChart(log) {
  const canvas = document.getElementById('chart-weekly');
  if (!canvas) return;
  if (chartInstances.weekly) chartInstances.weekly.destroy();

  // Group by week
  const weeks = {};
  log.forEach(e => {
    const d = new Date(e.date);
    const startOfWeek = new Date(d);
    startOfWeek.setDate(d.getDate() - d.getDay());
    const key = startOfWeek.toISOString().slice(0,10);
    weeks[key] = (weeks[key] || 0) + (e.reps || 0);
  });

  const sorted = Object.keys(weeks).sort();
  const labels = sorted.map(k => k.slice(5));
  const data = sorted.map(k => weeks[k]);

  chartInstances.weekly = new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Total Reps',
        data,
        backgroundColor: 'rgba(108,99,255,0.7)',
        borderColor: '#6c63ff',
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: chartOptions('reps')
  });
}

function chartOptions(yLabel) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: '#8888aa', font: { size: 11 } }, grid: { color: '#2e2e42' } },
      y: { ticks: { color: '#8888aa', font: { size: 11 } }, grid: { color: '#2e2e42' }, beginAtZero: true }
    }
  };
}

function seedDemoData() {
  if (!confirm('This will add 4 months of demo data. Continue?')) return;

  const log = DB.getLog();
  const now = new Date();
  const startDate = new Date(now);
  startDate.setDate(now.getDate() - 120);

  // Week plan: 0=bouldering,1=light,2=light,3=strength,4=volume,5=rest,6=max_test
  const weekPlan = { 0:'bouldering', 1:'light', 2:'light', 3:'strength', 4:'volume', 5:'rest', 6:'max_test' };

  // Adherence: ~75% — skip some days randomly but keep it realistic
  const skip = new Set([3,8,11,18,22,29,33,41,44,51,58,62,70,76,83,87,94,99,107,112]);

  let strengthLevel = 0; // starts easy: 4,3,2,2,1
  let ladderRounds  = 3;
  let ladderMax     = 3;

  for (let day = 0; day <= 120; day++) {
    if (skip.has(day)) continue;
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + day);
    const dow = d.getDay();
    const type = weekPlan[dow];
    if (!type || type === 'rest') continue;

    const dateStr = d.toISOString().slice(0, 10);
    const progress = day / 120; // 0→1 over 4 months

    // Progression: strength level up at ~week 6 and week 12
    if (day === 42) strengthLevel = 1;
    if (day === 84) strengthLevel = 2;
    if (day === 56) ladderRounds = 4;
    if (day === 98) { ladderMax = 4; ladderRounds = 3; }

    if (type === 'bouldering') {
      log.push({ id: d.getTime(), date: `${dateStr}T10:00:00.000Z`, sessionType: 'bouldering', setType: 'summary', reps: 0, forearmFatigue: 0, pain: false, notes: '' });
      continue;
    }

    if (type === 'light') {
      const sets = day < 30 ? 2 : 3;
      for (let i = 0; i < sets; i++) {
        log.push({ id: d.getTime() + i, date: `${dateStr}T${9 + i * 2}:00:00.000Z`, sessionType: 'light', setType: 'working', setNumber: i+1, reps: 2, forearmFatigue: 0, pain: false, notes: '' });
      }
      log.push({ id: d.getTime() + 99, date: `${dateStr}T15:00:00.000Z`, sessionType: 'light', setType: 'summary', reps: 0, forearmFatigue: 0, pain: false, notes: '' });
      continue;
    }

    if (type === 'strength') {
      const sets = strengthLevel === 0 ? [4,3,2,2,1] : strengthLevel === 1 ? [5,4,3,2,1] : [6,5,4,3,2,1];
      sets.forEach((reps, i) => {
        const actual = Math.max(reps - (Math.random() < 0.15 ? 1 : 0), 1);
        log.push({ id: d.getTime() + i, date: `${dateStr}T07:${String(i*3).padStart(2,'0')}:00.000Z`, sessionType: 'strength', setType: 'working', setNumber: i+1, reps: actual, forearmFatigue: 0, pain: false, notes: '' });
      });
      log.push({ id: d.getTime() + 99, date: `${dateStr}T07:20:00.000Z`, sessionType: 'strength', setType: 'summary', reps: 0, forearmFatigue: 0, pain: false, notes: '' });
      continue;
    }

    if (type === 'volume') {
      const ladder = Array.from({length: ladderMax}, (_, i) => i + 1);
      let idx = 0;
      for (let r = 0; r < ladderRounds; r++) {
        for (const reps of ladder) {
          log.push({ id: d.getTime() + idx, date: `${dateStr}T18:${String(idx).padStart(2,'0')}:00.000Z`, sessionType: 'volume', setType: 'working', setNumber: idx+1, reps, forearmFatigue: 0, pain: false, notes: '' });
          idx++;
        }
      }
      log.push({ id: d.getTime() + 99, date: `${dateStr}T18:30:00.000Z`, sessionType: 'volume', setType: 'summary', reps: 0, forearmFatigue: 0, pain: false, notes: '' });
      continue;
    }

    if (type === 'max_test') {
      // Warmup
      log.push({ id: d.getTime(), date: `${dateStr}T09:00:00.000Z`, sessionType: 'max_test', setType: 'warmup', setNumber: 0, reps: 2, forearmFatigue: 0, pain: false, notes: '' });
      // Max: starts at 5, grows to 7 by end
      // Realistic progression: 6→7 (wk4), 7→8 (wk8), 8→9 (wk12), 9→10 (wk16)
      const milestones = [[0,6],[28,7],[56,8],[84,9],[112,10]];
      let base = 6;
      for (const [d2, v] of milestones) if (day >= d2) base = v;
      const maxReps = Math.max(base - 1, base + (Math.random() < 0.35 ? -1 : Math.random() < 0.2 ? 1 : 0));
      log.push({ id: d.getTime() + 1, date: `${dateStr}T09:05:00.000Z`, sessionType: 'max_test', setType: 'max', setNumber: 1, reps: maxReps, forearmFatigue: 0, pain: false, notes: '' });
      log.push({ id: d.getTime() + 99, date: `${dateStr}T09:10:00.000Z`, sessionType: 'max_test', setType: 'summary', reps: 0, forearmFatigue: 0, pain: false, notes: '' });
    }
  }

  DB.set('puc_log', log);

  // Update progression to match where we are after 4 months
  const prog = DB.getProgression();
  prog.strength = { level: 2, easySessions: 1 };
  prog.volume   = { ladderLevel: 1, rounds: 3, easySessions: 1 };
  DB.setProgression(prog);

  closeSettingsModal();
  renderDashboard();
  alert('✅ Demo data loaded! Check History and Progress tabs.');
}

function clearAllData() {
  if (confirm('Delete ALL data? This cannot be undone.')) {
    ['puc_log','puc_plan','puc_settings','puc_session','puc_progression'].forEach(k => localStorage.removeItem(k));
    location.reload();
  }
}

// ============================================================
// SOUND
// ============================================================

let audioCtx = null;

function playBeep() {
  const s = DB.getSettings();
  if (!s.soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  } catch {}

  if (s.notificationsEnabled && Notification.permission === 'granted') {
    new Notification('Pull-Up Coach', { body: '⏰ Rest complete — start your next set!', icon: '' });
  }
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {

// ============================================================
// PWA: SERVICE WORKER + NOTIFICATIONS
// ============================================================

let swRegistration = null;
let deferredInstallPrompt = null;

async function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  try {
    swRegistration = await navigator.serviceWorker.register('./sw.js');
  } catch (e) {
    console.warn('SW registration failed:', e);
  }
}

// Schedule a notification via the service worker (works in background)
function scheduleNotification(delaySeconds, title, body, id = 'timer') {
  const s = DB.getSettings();
  if (!s.notificationsEnabled) return;
  if (Notification.permission !== 'granted') return;
  const target = swRegistration?.active || navigator.serviceWorker?.controller;
  if (!target) return;
  target.postMessage({ type: 'SCHEDULE_NOTIFICATION', id, delay: delaySeconds, title, body });
}

function cancelScheduledNotification(id = 'timer') {
  const target = swRegistration?.active || navigator.serviceWorker?.controller;
  if (target) target.postMessage({ type: 'CANCEL_NOTIFICATION', id });
}

function scheduleLightReminders() {
  const s = DB.getSettings();
  const li = s.light || { setsPerDay: 3, firstReminderHour: 9, intervalHours: 2, repsPerSet: 2 };
  const session = DB.getSession();
  const setsCompleted = (session?.type === 'light') ? (session.setIndex || 0) : 0;
  const now = new Date();

  for (let i = 0; i < 8; i++) cancelScheduledNotification(`light-${i}`);

  for (let i = setsCompleted; i < li.setsPerDay; i++) {
    const reminderTime = new Date();
    reminderTime.setHours(li.firstReminderHour + i * li.intervalHours, 0, 0, 0);
    const delaySec = Math.floor((reminderTime - now) / 1000);
    if (delaySec > 0) {
      scheduleNotification(
        delaySec,
        '🌱 Pull-Up Coach',
        `Mini-set ${i + 1}/${li.setsPerDay} — ${li.repsPerSet} easy reps`,
        `light-${i}`
      );
    }
  }
}

async function requestNotificationPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

// PWA install prompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Re-render dashboard to show install banner
  if (currentView === 'home') renderDashboard();
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  if (currentView === 'home') renderDashboard();
});

function triggerInstallPrompt() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.then(() => { deferredInstallPrompt = null; renderDashboard(); });
}

async function enableNotifications() {
  const granted = await requestNotificationPermission();
  if (granted) {
    const s = DB.getSettings();
    s.notificationsEnabled = true;
    DB.setSettings(s);
    renderDashboard();
  } else {
    alert('Notifications blocked. Enable them in your browser/phone settings.');
  }
}

// ============================================================
// INIT
// ============================================================

function init() {
  registerSW();

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && currentView === 'session') {
      const session = DB.getSession();
      if (session && session.phase === 'resting') {
        renderSessionResting(document.getElementById('session-content'), session);
      }
    }
  });

  renderDashboard();
  if (getTodayType() === 'light') scheduleLightReminders();
}

init();
</script>
