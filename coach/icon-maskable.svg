      <stop offset="0" stop-color="#12b76a"/>
      <stop offset="1" stop-color="#0e9f6e"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#gm)"/>
  <g transform="translate(19.2,19.2) scale(0.8)">
    <rect x="24" y="52" width="144" height="10" rx="5" fill="white" opacity="0.9"/>
    <rect x="68" y="52" width="12" height="20" rx="6" fill="white"/>
    <rect x="112" y="52" width="12" height="20" rx="6" fill="white"/>
    <line x1="74" y1="72" x2="90" y2="88" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <line x1="118" y1="72" x2="102" y2="88" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <rect x="87" y="86" width="18" height="40" rx="9" fill="white"/>
    <circle cx="96" cy="76" r="14" fill="white"/>
    <line x1="96" y1="126" x2="84" y2="155" stroke="white" stroke-width="9" stroke-linecap="round"/>
    <line x1="96" y1="126" x2="108" y2="155" stroke="white" stroke-width="9" stroke-linecap="round"/>
  </g>
</svg>
