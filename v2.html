<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Skill Progression Coach — Preview</title>
  <meta name="theme-color" content="#6c63ff">
  <style>
    :root{--bg:#0f0f13;--surface:#1a1a24;--surface2:#222232;--border:#2e2e42;--text:#f0f0f8;--muted:#8888aa;--accent:#6c63ff;--green:#2ecc71;--orange:#f39c12;--red:#e74c3c;--radius:14px}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.5}
    body{max-width:480px;margin:0 auto;min-height:100vh}
    .pad{padding:16px 16px 60px}
    h1{font-size:24px;margin-bottom:6px}h2{font-size:20px;margin-bottom:8px}h3{font-size:15px;margin-bottom:6px}
    .muted{color:var(--muted)}.small{font-size:13px}.mono{font-family:ui-monospace,monospace;font-size:13px}
    .topbar{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:700;font-size:16px}
    .chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;background:var(--accent);color:#fff;border-radius:10px;padding:2px 7px;vertical-align:middle}
    .chip.warn{background:var(--orange)}.chip.ok{background:var(--green)}
    .hero{text-align:center;padding:24px 0 8px}.hero-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;color:var(--accent);border:1px solid var(--accent);border-radius:12px;padding:3px 10px;margin-bottom:10px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0}
    .card.ok{border-color:rgba(46,204,113,.5)}.card.bad{border-color:rgba(231,76,60,.6)}
    .btn{display:block;width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:16px;font-weight:700;cursor:pointer;margin-top:10px}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .btn.danger{color:var(--red);border-color:rgba(231,76,60,.5)}
    .link{background:none;border:none;color:var(--accent);font-size:14px;cursor:pointer}
    .footnote{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6}code{background:var(--surface2);padding:1px 5px;border-radius:4px;font-size:12px}
    .section{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:20px 0 8px}
    table.kv{width:100%;border-collapse:collapse}table.kv td{padding:6px 4px;border-bottom:1px solid var(--border);vertical-align:top;font-size:14px}table.kv td:last-child{text-align:right}
    .goal-card{background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(108,99,255,.03));border:1px solid rgba(108,99,255,.35);border-radius:var(--radius);padding:16px;margin:12px 0}
    .goal-h{display:flex;justify-content:space-between;align-items:flex-start}.goal-t{font-size:19px;font-weight:800}
    .ready{text-align:center}.ready-n{font-size:26px;font-weight:900;color:var(--accent);line-height:1}.ready-l{font-size:10px;color:var(--muted);text-transform:uppercase}
    .focus{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
    .focus-chip{font-size:12px;border:1px solid var(--border);border-radius:20px;padding:4px 10px;background:var(--surface)}
    .focus-list{display:flex;flex-direction:column;gap:6px;margin-top:6px}
    .focus-area{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
    .focus-area.support{opacity:.85;border-style:dashed}
    .focus-area.later{background:none;border-style:dashed}
    .fa-label{font-size:13px;font-weight:700}.fa-node{font-size:12px;font-weight:700;margin-top:2px}.fa-note{margin-top:2px}
    .ready-branches{display:flex;flex-direction:column;gap:6px;margin-top:6px}
    .rb{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px}
    .rb-top{display:flex;justify-content:space-between;font-size:12px;font-weight:700}
    .rb-label{color:var(--accent)}
    .pips{display:flex;gap:4px;margin-top:5px}
    .pip{width:26px;height:6px;border-radius:3px;background:var(--surface2);border:1px solid var(--border)}
    .pip.on{background:var(--accent);border-color:var(--accent)}
    .node-needs{font-size:10px;color:var(--muted);margin-top:5px;line-height:1.3}
    .review-row.frozen{opacity:.7;border-style:dashed}
    .frozen-tag{font-size:12px;font-weight:700;color:var(--muted)}
    /* Weekly Coach Home */
    .today-card{background:linear-gradient(135deg,rgba(108,99,255,.14),rgba(108,99,255,.03));border:1px solid rgba(108,99,255,.4);border-radius:var(--radius);padding:16px;margin:6px 0 12px}
    .tc-title{font-size:20px;font-weight:800}
    .tc-detail{font-size:14px;margin-top:4px}
    .tc-why{margin-top:8px;line-height:1.5}
    .today-card .btn.primary{margin-top:12px}
    .wk-line{font-size:14px;padding:7px 0;border-bottom:1px solid var(--border)}
    .wk-k{font-weight:700;margin-right:6px}
    .wk-line.skip{color:var(--muted)}
    .mini{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:2px 8px;font-size:12px;margin:2px 2px 0 0}
    .quick{display:flex;gap:10px;margin-top:14px}
    .quick .btn{margin-top:0}
    .btn.linklike{background:none;border:1px dashed var(--border);color:var(--muted);font-weight:600}
    .goals-strip{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:18px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
    .goal-lnk{color:var(--muted);text-decoration:underline}
    .strip-actions{margin-left:auto;display:flex;gap:8px}
    /* Guided map */
    .map-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .filters{display:flex;gap:4px}
    .fchip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:4px 9px;font-size:12px;cursor:pointer}
    .fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
    .note{margin:6px 0}
    .unlock-card{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.4);border-radius:12px;padding:12px;margin:8px 0}
    .uc-h{font-size:12px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.5px}
    .uc-body{font-size:15px;font-weight:700;margin-top:2px}
    .zone-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:16px 0 6px}
    .now-row{margin-bottom:8px}
    .now-branch{margin-bottom:2px}
    .zn{display:inline-flex;align-items:center;gap:7px;width:100%;text-align:left;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);cursor:pointer}
    .chips .zn{width:auto;margin:0 6px 6px 0}
    .zn-dot{width:9px;height:9px;border-radius:50%;flex:none}
    .zn-name{font-size:14px;font-weight:700}
    .zn-status{margin-left:auto;font-size:12px;font-weight:700}
    .zn-shared{font-size:12px}
    .chips{display:flex;flex-wrap:wrap}
    .frozen-row{background:var(--surface);border:1px dashed var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px}
    /* Check-in / option pickers */
    .opts{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
    .opt{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:8px 12px;font-size:13px;cursor:pointer}
    .opt.on{background:var(--accent-dim,rgba(108,99,255,.2));border-color:var(--accent);color:#fff;background:var(--accent)}
    .lesson-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .lesson-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 10px;cursor:pointer;color:var(--text);text-align:center}
    .lb-icon{font-size:26px}.lb-name{font-size:13px;font-weight:700;margin-top:4px}
    .map-lane{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
    .node{min-width:130px;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:12px;cursor:pointer}
    .node-dot{width:10px;height:10px;border-radius:50%;margin-bottom:6px}
    .node-name{font-size:13px;font-weight:700;line-height:1.2}.node-status{font-size:11px;font-weight:700;margin-top:4px}
    .node-goals{margin-top:6px;font-size:13px}.gb{margin-right:2px}
    .review-row{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--surface)}
    .review-row.attention{border-color:rgba(243,156,18,.6);background:rgba(243,156,18,.06)}
    .rr-main{flex:1;min-width:0}.rr-name{font-size:14px;font-weight:700}.rr-ev{font-size:12px;margin-top:2px}
    .status-sel{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px;font-size:13px}
    .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
    .lesson-card{text-align:center;background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:20px;margin:12px 0}
    .target{font-size:64px;font-weight:900;color:var(--accent)}
    .stepper{display:flex;align-items:center;justify-content:center;gap:24px;margin:14px 0}
    .stepper span{font-size:56px;font-weight:900;color:var(--accent);min-width:72px;text-align:center}
    .rnd{width:52px;height:52px;border-radius:50%;border:2px solid var(--muted);background:none;color:var(--text);font-size:28px;cursor:pointer}
    .timer{text-align:center;padding:30px 0}.tnum{font-size:48px;font-weight:900;color:var(--accent)}
    .complete,.unlock{text-align:center;padding:30px 10px}.big{font-size:56px}
    .unlock-line{font-size:15px;margin:8px 0}
    ul{margin:6px 0 0 18px;font-size:14px}
  </style>
</head>
<body>

</body>
</html>
